name: Generate Pacman

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pacman
        uses: Platane/snk@v3
        with:
          github_user_name: samuel-senai08
          outputs: |
            dist/pacman.svg

      - name: Push Pacman to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
